<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Terminal window chrome -->
  <rect x="60" y="30" width="1080" height="660" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="60" y="30" width="1080" height="40" rx="12" fill="#1e1e1e"/>
  <rect x="60" y="58" width="1080" height="12" fill="#1e1e1e"/>
  <circle cx="88" cy="50" r="6" fill="#ff5f57"/>
  <circle cx="108" cy="50" r="6" fill="#febc2e"/>
  <circle cx="128" cy="50" r="6" fill="#28c840"/>
  <text x="600" y="55" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, monospace" font-size="12" fill="#666">strategy-engine — claude code</text>

  <!-- Terminal content area -->
  <g font-family="SF Mono, Menlo, Monaco, monospace" font-size="13">

    <!-- Prompt line 1 -->
    <text x="90" y="100" fill="#6366f1">$</text>
    <text x="108" y="100" fill="#e4e4e7">/strategy:courtroom</text>

    <!-- User input -->
    <text x="90" y="125" fill="#71717a">"Our positioning is that we're the platform where AI recommendations</text>
    <text x="90" y="143" fill="#71717a"> meet human curation for better discovery."</text>

    <!-- Blank line -->

    <!-- System output: Loading -->
    <text x="90" y="178" fill="#6366f1" filter="url(#glow)">&#9656; Courtroom convened.</text>
    <text x="90" y="198" fill="#3f3f46">  Dispatching 10 agents across 2 rounds...</text>

    <!-- Blank line -->

    <!-- Round 1 header -->
    <text x="90" y="233" fill="#a1a1aa">ROUND 1</text>
    <text x="175" y="233" fill="#3f3f46">independent critique (hidden from each other)</text>

    <!-- Agent outputs - Round 1 -->
    <text x="90" y="258" fill="#ef4444">  Reductionist</text>
    <text x="250" y="258" fill="#a1a1aa">"Every recommendation platform says this. What's yours?"</text>

    <text x="90" y="280" fill="#8b5cf6">  Empiricist</text>
    <text x="250" y="280" fill="#a1a1aa">"Name one study showing human curation outperforms algorithms."</text>

    <text x="90" y="302" fill="#f59e0b">  Competitor</text>
    <text x="250" y="302" fill="#a1a1aa">"Spotify, Pinterest, and Etsy could run this exact line."</text>

    <text x="90" y="324" fill="#ec4899">  Audience</text>
    <text x="250" y="324" fill="#a1a1aa">"I don't care how you recommend things. I care what I find."</text>

    <text x="90" y="346" fill="#06b6d4">  Cynic</text>
    <text x="250" y="346" fill="#a1a1aa">"Your eng team will ship the AI. The human curation will be</text>
    <text x="250" y="364" fill="#a1a1aa"> 3 interns with a spreadsheet by Q3."</text>

    <text x="90" y="386" fill="#71717a">  + 5 more agents...</text>

    <!-- Blank line -->

    <!-- Round 2 header -->
    <text x="90" y="416" fill="#a1a1aa">ROUND 2</text>
    <text x="175" y="416" fill="#3f3f46">agents respond to each other</text>

    <text x="90" y="441" fill="#ef4444">  Reductionist</text>
    <text x="250" y="441" fill="#a1a1aa">"Competitor is right. Three brands own this space already."</text>

    <text x="90" y="463" fill="#14b8a6">  Creative</text>
    <text x="250" y="463" fill="#a1a1aa">"I can't make an ad from 'AI + human.' Give me a feeling."</text>

    <text x="90" y="485" fill="#78716c">  Historian</text>
    <text x="250" y="485" fill="#a1a1aa">"StitchFix tried this positioning in 2019. Pivoted to</text>
    <text x="250" y="503" fill="#a1a1aa"> 'your style, figured out' within 8 months."</text>

    <!-- Blank line -->

    <!-- Verdict -->
    <rect x="85" y="525" width="1010" height="130" rx="6" fill="#1e1e1e" stroke="#ef4444" stroke-width="0.5" opacity="0.8"/>

    <text x="105" y="550" fill="#ef4444" font-size="11" letter-spacing="3" font-weight="600">VERDICT: HAS GAPS</text>
    <text x="330" y="550" fill="#3f3f46" font-size="11">scored 24/50</text>

    <text x="105" y="575" fill="#a1a1aa" font-size="12">What survived:</text>
    <text x="240" y="575" fill="#e4e4e7" font-size="12">The discovery outcome (people want to find things they didn't know existed)</text>

    <text x="105" y="597" fill="#a1a1aa" font-size="12">What got killed:</text>
    <text x="250" y="597" fill="#e4e4e7" font-size="12">AI + human framing (undifferentiated), curation claim (undefendable at scale)</text>

    <text x="105" y="619" fill="#a1a1aa" font-size="12">Kill shot:</text>
    <text x="195" y="619" fill="#fbbf24" font-size="12">"You're describing the mechanism, not the magic. Nobody buys a drill</text>
    <text x="195" y="637" fill="#fbbf24" font-size="12"> for the motor specs."</text>

  </g>

  <!-- Blinking cursor -->
  <rect x="90" y="665" width="8" height="16" fill="#6366f1" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

</svg>
